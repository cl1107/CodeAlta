"The agent asked a question. CodeAlta will prefer continue/inspect-style choices or use a neutral fallback answer so the run can continue.":
  de: "Der Agent hat eine Frage gestellt. CodeAlta bevorzugt Weiter-/Prüfoptionen oder nutzt eine neutrale Ausweichantwort, damit der Lauf fortgesetzt werden kann."
  es: "El agente hizo una pregunta. CodeAlta preferirá opciones de estilo continuar/inspeccionar o usar una respuesta alternativa neutral para que la ejecución pueda continuar."
  fr: "L’agent a posé une question. CodeAlta privilégiera les choix continuer/inspecter ou une réponse neutre pour permettre à l’exécution de continuer."
  ja: "エージェントが質問しました。実行を続行できるよう、CodeAlta は続行/確認系の選択肢を優先し、なければ中立的な代替回答を使います。"
  zh: "智能体提出了问题。CodeAlta 会优先选择继续/检查类选项，或使用中性后备答案，以便运行可以继续。"
"The agent asked a question. Terminal question prompts are not implemented yet, so CodeAlta returns empty answers for now.":
  de: "Der Agent hat eine Frage gestellt. Terminal-Frage-Prompts sind noch nicht implementiert, daher gibt CodeAlta vorerst leere Antworten zurück."
  es: "El agente hizo una pregunta. Los prompts de preguntas del terminal aún no están implementados, por lo que CodeAlta devuelve respuestas vacías por ahora."
  fr: "L’agent a posé une question. Les questions en terminal ne sont pas encore implémentées ; CodeAlta renvoie donc des réponses vides pour l’instant."
  ja: "エージェントが質問しました。端末の質問プロンプトは未実装のため、当面 CodeAlta は空の回答を返します。"
  zh: "智能体提出了问题。终端问题提示尚未实现，因此 CodeAlta 目前返回空答案。"
"The agent is blocked until this permission request is resolved.":
  de: "Der Agent ist blockiert, bis diese Berechtigungsanfrage erledigt ist."
  es: "El agente está bloqueado hasta que se resuelva esta solicitud de permiso."
  fr: "L’agent est bloqué jusqu’à résolution de cette demande d’autorisation."
  ja: "この権限要求が解決するまでエージェントはブロックされます。"
  zh: "在此权限请求解决前，智能体会被阻塞。"
"The attached file has unsaved edits. Save them before exiting ask mode?":
