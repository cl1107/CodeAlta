"Browse discovered skills, validation diagnostics, source precedence, and provenance.":
  de: "Entdeckte Skills, Validierungsdiagnosen, Quellenpriorität und Herkunft anzeigen."
  es: "Explore las skills descubiertas, los diagnósticos de validación, la precedencia de fuentes y la procedencia."
  fr: "Parcourir les skills découvertes, diagnostics, priorité des sources et provenance."
  ja: "検出済みスキル、検証診断、ソース優先度、由来を参照。"
  zh: "浏览已发现的技能、验证诊断、来源优先级和来源信息。"
"Browse provider models and enriched model metadata, then select one for the current prompt or session.":
  de: "Anbietermodelle und Metadaten durchsuchen und eines für den aktuellen Prompt oder die Sitzung auswählen."
  es: "Explore los modelos de proveedores y los metadatos de modelos enriquecidos y luego elija uno para el prompt o sesión actual."
  fr: "Parcourir les modèles fournisseur et leurs métadonnées, puis en choisir un pour le prompt ou la session."
  ja: "プロバイダーモデルと拡張メタデータを参照し、現在のプロンプト/セッション用に選択。"
  zh: "浏览提供商模型和增强的模型元数据，然后为当前提示词或会话选择一个模型。"
"Browse skills, manage global/project enablement for the shown list, activate enabled skills, or open SKILL.md and related files. G/P are editable enablement columns; Built-in marks built-in skills.":
  de: "Skills durchsuchen, globale/Projekt-Aktivierung verwalten, aktivierte Skills starten oder SKILL.md und zugehörige Dateien öffnen. G/P sind bearbeitbare Aktivierungsspalten; Integriert markiert integrierte Skills."
  es: "Explore skills, administre la habilitación global/de proyectos para la lista mostrada, active skills habilitadas o abra SKILL.md y archivos relacionados. G/P son columnas de habilitación editables; Integrado marca las skills integradas."
  fr: "Parcourir les skills, gérer l’activation globale/projet, activer les skills ou ouvrir SKILL.md et les fichiers liés. G/P sont modifiables ; Intégré marque les skills intégrées."
  ja: "スキルを参照し、表示一覧のグローバル/プロジェクト有効化を管理。有効なスキルの有効化や SKILL.md/関連ファイルの表示も可能。G/P は編集可能な有効化列、Built-in は組み込みスキル。"
  zh: "浏览技能，管理所显示列表的全局/项目启用状态，激活已启用技能，或打开 SKILL.md 及相关文件。G/P 是可编辑的启用列；Built-in 表示内置技能。"
