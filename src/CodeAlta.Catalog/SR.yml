"Agent prompts are Markdown files under built-in content, ~/.alta/prompts/agents, or project .alta/prompts/agents. Later sources override earlier ids; built-ins are read-only. Use the System Prompt tab to edit only global/project system prompt overrides.":
  de: "Agent-Prompts sind Markdown-Dateien in integrierten Inhalten, ~/.alta/prompts/agents oder Projekt .alta/prompts/agents. Spätere Quellen überschreiben frühere IDs; integrierte Prompts sind schreibgeschützt. Im Tab System-Prompt nur globale/Projekt-System-Prompt-Überschreibungen bearbeiten."
  es: "Los prompts del agente son archivos Markdown del contenido integrado, de ~/.alta/prompts/agents o de .alta/prompts/agents del proyecto. Las fuentes posteriores reemplazan los ids anteriores; los integrados son de solo lectura. Use la pestaña Prompt del sistema para editar solo reemplazos globales/de proyecto del prompt del sistema."
  fr: "Les prompts agent sont des fichiers Markdown intégrés, sous ~/.alta/prompts/agents ou .alta/prompts/agents du projet. Les sources tardives remplacent les ids précédents ; les intégrés sont en lecture seule. L’onglet Prompt système édite seulement les remplacements globaux/projet."
  ja: "エージェントプロンプトは組み込み、~/.alta/prompts/agents、プロジェクト .alta/prompts/agents の Markdown ファイルです。後のソースが同じ ID を上書きします。組み込みは読み取り専用。グローバル/プロジェクトのシステムプロンプト上書きだけを編集するには「システムプロンプト」タブを使用。"
  zh: "智能体提示词是内置内容、~/.alta/prompts/agents 或项目 .alta/prompts/agents 下的 Markdown 文件。后加载的来源会覆盖先前的相同 ID；内置提示词为只读。请使用“系统提示词”标签页仅编辑全局/项目系统提示词覆盖项。"
