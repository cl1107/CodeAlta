"xAI Grok Device Login":
  de: "xAI Grok Geräteanmeldung"
  es: "Login de dispositivo xAI Grok"
  fr: "xAI Grok Connexion appareil"
  ja: "xAI Grok デバイスログイン"
  zh: "xAI Grok 设备登录"
"xAI Grok login uses the public Grok-CLI OAuth client and stores CodeAlta-owned access + refresh tokens for this provider. Browser login opens auth.x.ai for PKCE; device login prints a code for headless hosts. No model turn is sent.":
  de: "xAI-Grok-Anmeldung verwendet den öffentlichen Grok-CLI-OAuth-Client und speichert CodeAlta-eigene Zugriffs- und Refresh-Token für diesen Anbieter. Browser-Anmeldung öffnet auth.x.ai für PKCE; Geräteanmeldung zeigt einen Code für Headless-Hosts. Kein Modell-Turn wird gesendet."
  es: "El login de xAI Grok usa el cliente OAuth público de Grok-CLI y almacena tokens de acceso y actualización propiedad de CodeAlta para este proveedor. El login en navegador abre auth.x.ai para PKCE; el login de dispositivo imprime un código para hosts sin interfaz. No se envía ningún turno de modelo."
  fr: "La connexion xAI Grok utilise le client OAuth public Grok-CLI et stocke les tokens d’accès et de rafraîchissement CodeAlta pour ce fournisseur. La connexion navigateur ouvre auth.x.ai pour PKCE ; la connexion appareil affiche un code pour les hôtes sans interface. Aucun tour modèle n’est envoyé."
  ja: "xAI Grok ログインは公開 Grok-CLI OAuth クライアントを使用し、このプロバイダー用に CodeAlta 所有のアクセス/更新トークンを保存します。ブラウザログインは PKCE 用に auth.x.ai を開き、デバイスログインはヘッドレスホスト向けにコードを表示します。モデルターンは送信されません。"
  zh: "xAI Grok 登录使用公共 Grok-CLI OAuth 客户端，并为此提供商存储 CodeAlta 拥有的访问令牌和刷新令牌。浏览器登录会打开 auth.x.ai 进行 PKCE；设备登录会为无头主机打印代码。不会发送模型回合。"
