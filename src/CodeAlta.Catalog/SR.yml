"Source plugins are trusted code: build and load operations can execute local plugin or package build logic. Use --no-plugins, --plugin-safe-mode, or CODEALTA_DISABLE_PLUGINS=1 if a plugin breaks startup.":
  de: "Quell-Plugins sind vertrauenswürdiger Code: Build- und Ladeoperationen können lokale Plugin- oder Paket-Build-Logik ausführen. Verwenden Sie --no-plugins, --plugin-safe-mode oder CODEALTA_DISABLE_PLUGINS=1, wenn ein Plugin den Start stört."
  es: "Los plugins fuente son código confiable: las operaciones de compilación y carga pueden ejecutar plugins locales o lógica de compilación de paquetes. Use --no-plugins, --plugin-safe-mode o CODEALTA_DISABLE_PLUGINS=1 si un plugin interrumpe el inicio."
  fr: "Les plugins source sont du code de confiance : les opérations de compilation et chargement peuvent exécuter une logique locale de plugin ou paquet. Utilisez --no-plugins, --plugin-safe-mode ou CODEALTA_DISABLE_PLUGINS=1 si un plugin bloque le démarrage."
  ja: "ソースプラグインは信頼済みコードです。ビルドや読み込み操作でローカルプラグイン/パッケージのビルド処理が実行される場合があります。プラグインが起動を妨げる場合は --no-plugins、--plugin-safe-mode、または CODEALTA_DISABLE_PLUGINS=1 を使用してください。"
  zh: "源码插件是受信任代码：构建和加载操作可能执行本地插件或包构建逻辑。如果插件导致启动失败，请使用 --no-plugins、--plugin-safe-mode 或 CODEALTA_DISABLE_PLUGINS=1。"
