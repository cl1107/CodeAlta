"Azure OpenAI requires Model or Single Model Id to be a deployment name.":
  de: "Azure OpenAI benötigt Model oder Single Model Id als Bereitstellungsnamen."
  es: "Azure OpenAI requiere que el ID de modelo o modelo único sea un nombre de implementación."
  fr: "Azure OpenAI exige que Model ou Single Model Id soit un nom de déploiement."
  ja: "Azure OpenAI では Model または Single Model Id にデプロイ名が必要です。"
  zh: "Azure OpenAI 要求 Model 或 Single Model Id 为部署名称。"
"Azure OpenAI requires the resource endpoint in API URL.":
  de: "Azure OpenAI benötigt den Ressourcenendpunkt in der API-URL."
  es: "Azure OpenAI requiere el punto de conexión del recurso en la URL de API."
  fr: "Azure OpenAI exige le point de terminaison de ressource dans API URL."
  ja: "Azure OpenAI では API URL にリソースエンドポイントが必要です。"
  zh: "Azure OpenAI 要求在 API URL 中填写资源端点。"
"Azure OpenAI uses deployment names as model IDs; set Model or Single Model Id to your deployment name.":
  de: "Azure OpenAI verwendet Bereitstellungsnamen als Modell-IDs; setzen Sie Model oder Single Model Id auf Ihren Bereitstellungsnamen."
  es: "Azure OpenAI usa nombres de implementación como identificadores de modelo; establezca Modelo o ID de modelo único en el nombre de su implementación."
  fr: "Azure OpenAI utilise les noms de déploiement comme ids de modèle ; définissez Model ou Single Model Id sur votre déploiement."
  ja: "Azure OpenAI はデプロイ名をモデル ID として使います。Model または Single Model Id にデプロイ名を設定。"
  zh: "Azure OpenAI 使用部署名称作为模型 ID；请将 Model 或 Single Model Id 设置为你的部署名称。"
