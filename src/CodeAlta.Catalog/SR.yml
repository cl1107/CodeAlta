"Advanced provider TOML sections such as profile, compaction, extra_body, and model_overrides are preserved when you save from this form. Use Advanced TOML to edit them directly.":
  de: "Erweiterte Anbieter-TOML-Abschnitte wie profile, compaction, extra_body und model_overrides bleiben beim Speichern erhalten. Mit Erweiterte TOML direkt bearbeiten."
  es: "Las secciones TOML avanzadas del proveedor, como profile, compaction, extra_body y model_overrides, se conservan al guardar desde este formulario. Use Advanced TOML para editarlas directamente."
  fr: "Les sections TOML avancées (profile, compaction, extra_body, model_overrides) sont conservées à l’enregistrement. Utilisez TOML avancé pour les modifier."
  ja: "profile、compaction、extra_body、model_overrides などの高度なプロバイダー TOML セクションはフォーム保存時も保持されます。直接編集は高度な TOML を使用。"
  zh: "从此表单保存时，会保留 profile、compaction、extra_body 和 model_overrides 等高级提供商 TOML 段。请使用“高级 TOML”直接编辑它们。"
